name: Check Domain DNS Records

on:
  push:
    paths:
      - '.github/workflows/check-domain.yml'

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Check domain verification status
        run: |
          curl -s \
            -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" \
            "https://api.vercel.com/v10/projects/sea-venture-flow/domains/arubabob.getyetti.com?teamId=team_nP2qlORT0fbwV4sh5pdRbXiJ" \
            > domain-info.json
          cat domain-info.json

      - name: Commit
        run: |
          git config user.email "bot@ci.com"
          git config user.name "CI Bot"
          git add domain-info.json
          git diff --staged --quiet || git commit -m "chore: domain status check [skip ci]"
          git push
