name: Check Domain DNS Records

on:
  push:
    paths:
      - '.github/workflows/check-domain.yml'

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get domain config and save to file
        run: |
          curl -s \
            -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" \
            "https://api.vercel.com/v10/projects/sea-venture-flow/domains/arubabob.getyetti.com" \
            > domain-info.json
          cat domain-info.json

      - name: Commit domain info back to repo
        run: |
          git config user.email "bot@ci.com"
          git config user.name "CI Bot"
          git add domain-info.json
          git commit -m "chore: save domain DNS info [skip ci]" || echo "nothing to commit"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/FloFlo32/sea-venture-flow.git HEAD:main
