name: Check Domain DNS Records

on:
  push:
    paths:
      - '.github/workflows/check-domain.yml'

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Get domain config from Vercel
        run: |
          curl -s \
            -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" \
            "https://api.vercel.com/v10/projects/sea-venture-flow/domains/arubabob.getyetti.com" \
            | python3 -c "
import sys, json
d = json.load(sys.stdin)
print('name:', d.get('name'))
print('verified:', d.get('verified'))
print('verification:', json.dumps(d.get('verification', []), indent=2))
print('FULL:', json.dumps(d, indent=2))
"
